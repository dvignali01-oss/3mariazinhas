<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Três Mariazinhas - Doceria</title>

    img src="icon/icon.png" alt="Logotipo Três Mariazinhas" width="400">

    < href="icon-512x512.png">
    <link rel="icon" type="image/png" href="icon-512x512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F09DBA">
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta baseada no logotipo */
            --primary: #E96C8E;        /* Rosa forte do laço */
            --primary-hover: #D45B7D;
            --secondary: #F09DBA;      /* Rosa médio */
            --bg-color: #FFF5F7;       /* Fundo rosa bem suave */
            --card-bg: #FFFFFF;        /* Fundo dos cards */
            --text-main: #5F3E35;      /* Marrom escuro (contorno do desenho) */
            --text-light: #9B7E76;     /* Marrom claro para textos secundários */
            --success: #10B981;        /* Verde para preços e finalizar */
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 120px; /* Espaço para o carrinho flutuante */
        }

        /* HEADER */
        header {
            background: var(--secondary);
            padding: 20px 20px 25px;
            text-align: center;
            border-bottom-left-radius: var(--radius-lg);
            border-bottom-right-radius: var(--radius-lg);
            box-shadow: 0 4px 15px rgba(233, 108, 142, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header img {
            width: 180px; /* Ajuste o tamanho do seu logo aqui */
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        header p {
            margin: 5px 0 0;
            color: #FFFFFF;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* PRODUTOS */
        .container {
            padding: 20px 15px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 12px rgba(95, 62, 53, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card img {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .info { flex: 1; }
        
        .info b {
            font-size: 1.05rem;
            display: block;
            margin-bottom: 4px;
            color: var(--text-main);
            line-height: 1.2;
        }

        .price {
            color: var(--success);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .btn-add {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-add:hover, .btn-add:active { background: var(--primary-hover); }

        /* CARRINHO FLUTUANTE */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translate(-50%, 150%);
            background: var(--text-main);
            color: white;
            padding: 16px 24px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 400px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(95, 62, 53, 0.3);
            cursor: pointer;
            z-index: 200;
            font-weight: 500;
        }

        .cart-bar.active { transform: translate(-50%, 0); }
        .cart-bar i { color: var(--secondary); margin-right: 8px; font-size: 1.2rem; }

        /* MODAL BOTTOM SHEET (ESTILO APP) */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(95, 62, 53, 0.6);
            z-index: 300;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }

        .modal-box {
            background: var(--bg-color);
            padding: 25px 20px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            position: absolute;
            bottom: 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(233, 108, 142, 0.2);
            padding-bottom: 10px;
        }

        .modal-header h3 { margin: 0; color: var(--text-main); }
        .close-icon { font-size: 1.5rem; color: var(--text-light); cursor: pointer; }

        /* LISTA DO CARRINHO */
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .item-name { font-weight: 600; font-size: 0.95rem; }
        .item-price { color: var(--text-light); font-size: 0.85rem; }

        .qty-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--bg-color);
            padding: 4px 8px;
            border-radius: 8px;
        }

        .qty-btn {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0 5px;
            cursor: pointer;
        }

        /* FORMULÁRIO DE CHECKOUT */
        .form-group { margin-top: 20px; }
        
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid rgba(233, 108, 142, 0.3);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, select:focus { border-color: var(--primary); }

        .btn-send {
            background: var(--success);
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* Animações */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body>

    <header>
        <img src="logo.png" alt="Três Mariazinhas">
        <p><i class="fas fa-heart"></i> Feito com amor para você</p>
    </header>

    <div class="container" id="list"></div>

    <div class="cart-bar" id="cart-bar" onclick="openCart()">
        <span><i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span> itens</span>
        <b id="total-price">R$ 0,00</b>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Seu Pedido</h3>
                <i class="fas fa-times close-icon" onclick="closeCart()"></i>
            </div>
            
            <div id="items-list"></div>
            
            <div class="form-group">
                <input id="name" type="text" placeholder="Seu Nome Completo">
                <input id="addr" type="text" placeholder="Endereço (Rua, Número, Bairro)">
                <select id="pay">
                    <option value="" disabled selected>Forma de Pagamento</option>
                    <option value="Pix">Pix (Chave na entrega)</option>
                    <option value="Cartão">Cartão (Levar maquininha)</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>

            <button class="btn-send" onclick="sendWhatsApp()">
                <i class="fab fa-whatsapp"></i> Enviar Pedido
            </button>
        </div>
    </div>

    <script>
        // Usei imagens genéricas de alta qualidade para doces, 
        // mas você pode substituir pelos links das suas fotos reais.
        const products = [
            {id: 1, name: "Bolo de Ninho com Morango", price: 18.00, img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=300&h=300&fit=crop"},
            {id: 2, name: "Copo da Felicidade", price: 22.00, img: "https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?w=300&h=300&fit=crop"},
            {id: 3, name: "Caixinha c/ 6 Brigadeiros", price: 15.00, img: "https://images.unsplash.com/photo-1599599810769-bcde5a160d32?w=300&h=300&fit=crop"}
        ];

        let cart = {};

        function renderProducts() {
            const list = document.getElementById('list');
            list.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="info">
                        <b>${p.name}</b>
                        <div class="price">R$ ${p.price.toFixed(2).replace('.', ',')}</div>
                        <button class="btn-add" onclick="addToCart(${p.id})">Adicionar</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            if (cart[id]) {
                cart[id].qty += 1;
            } else {
                const product = products.find(p => p.id === id);
                cart[id] = { ...product, qty: 1 };
            }
            updateCartUI();
        }

        function changeQty(id, delta) {
            if (cart[id]) {
                cart[id].qty += delta;
                if (cart[id].qty <= 0) delete cart[id];
            }
            updateCartUI();
            openCart(); // Atualiza a lista na tela
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            const countEl = document.getElementById('cart-count');
            const totalEl = document.getElementById('total-price');
            
            const items = Object.values(cart);
            const totalItems = items.reduce((acc, curr) => acc + curr.qty, 0);
            const totalPrice = items.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);

            if (totalItems > 0) {
                bar.classList.add('active');
            } else {
                bar.classList.remove('active');
                closeCart();
            }

            countEl.innerText = totalItems;
            totalEl.innerText = `R$ ${totalPrice.toFixed(2).replace('.', ',')}`;
        }

        function openCart() {
            const modal = document.getElementById('modal');
            const list = document.getElementById('items-list');
            const items = Object.values(cart);

            if (items.length === 0) return;

            modal.style.display = 'block';
            list.innerHTML = items.map(i => `
                <div class="item-row">
                    <div>
                        <div class="item-name">${i.name}</div>
                        <div class="item-price">R$ ${(i.price * i.qty).toFixed(2).replace('.', ',')}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(${i.id}, -1)">-</button>
                        <span>${i.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function closeCart() {
            document.getElementById('modal').style.display = 'none';
        }

        function sendWhatsApp() {
            const name = document.getElementById('name').value.trim();
            const addr = document.getElementById('addr').value.trim();
            const pay = document.getElementById('pay').value;

            if (!name || !addr || !pay) {
                alert("Por favor, preencha todos os campos (Nome, Endereço e Pagamento) para finalizar!");
                return;
            }

            let msg = `🎀 *Novo Pedido - Três Mariazinhas* 🎀\n\n`;
            msg += `👤 *Cliente:* ${name}\n`;
            msg += `📍 *Endereço:* ${addr}\n`;
            msg += `💳 *Pagamento:* ${pay}\n`;
            msg += `--------------------------\n`;

            Object.values(cart).forEach(i => {
                msg += `▶ ${i.qty}x ${i.name} - R$ ${(i.price * i.qty).toFixed(2).replace('.', ',')}\n`;
            });

            const total = Object.values(cart).reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
            msg += `--------------------------\n`;
            msg += `💰 *TOTAL: R$ ${total.toFixed(2).replace('.', ',')}*`;

            const phone = "5511915183761";
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
        }

        // Fechar modal ao clicar fora da caixa branca
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                closeCart();
            }
        }

        renderProducts();
    </script>

</body>
</html>
