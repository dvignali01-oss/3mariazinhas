<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Três Mariazinhas - App</title>
    
    <link rel="apple-touch-icon" href="icon-512x512.png">
    <link rel="icon" type="image/png" href="icon-512x512.png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #E96C8E;    /* Rosa escuro/magenta do laço/coração */
            --secondary: #F09DBA;  /* Rosa médio do banner */
            --dark: #F5E6EC;       /* Fundo rosa pálido suave para a página */
            --card: #FFFFFF;       /* Fundo branco limpo para cartões */
            --text: #5F3E35;       /* Castanho escuro dos contornos */
            --header-bg: #F09DBA;  /* Rosa médio do banner para o header */
            --header-text: #FFFFFF;/* Texto branco para o header */
            --success: #22c55e;    /* Manter cor de preço para clareza, mas pode mudar */
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: var(--dark);
            color: var(--text);
            padding-bottom: 100px;
        }

        header {
            padding: 20px;
            text-align: center;
            background: var(--header-bg);
            color: var(--header-text);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        header img {
            width: 120px;
            height: auto;
            border-radius: 10px; /* Opcional */
        }

        header h2 {
            display: none; /* Substituir texto por imagem */
        }

        .menu {
            padding: 15px;
        }

        .card {
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }

        .info {
            flex: 1;
        }

        .price {
            color: var(--success);
            font-weight: bold;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #E05C7A; /* Um rosa um pouco mais escuro para hover */
        }

        .cart {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 400px;
            visibility: hidden;
            z-index: 200;
        }

        .cart.active {
            visibility: visible;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            padding: 20px;
            z-index: 300;
        }

        .modal-box {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            max-height: 80vh;
            overflow: auto;
            border: 1px solid rgba(0,0,0,0.1);
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            color: var(--text);
            background: var(--dark);
        }

        select {
            background: var(--card);
        }
    </style>
</head>

<body>

    <header>
        <img src="logo.png" alt="Logotipo Três Mariazinhas">
        <small>Doces Premium</small>
    </header>

    <div class="menu" id="list"></div>

    <div class="cart" id="cart" onclick="openCart()">
        <span><i class="fas fa-shopping-cart"></i> Carrinho</span>
        <span id="total">R$0</span>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <h3>Pedido</h3>
            <div id="items"></div>
            <input id="name" placeholder="Nome">
            <input id="addr" placeholder="Endereço">
            <select id="pay">
                <option>Pix</option>
                <option>Cartão</option>
                <option>Dinheiro</option>
            </select>
            <button onclick="send()">Enviar WhatsApp</button>
            <button onclick="closeCart()">Fechar</button>
        </div>
    </div>

    <script>
        const products = [{
            id: 1,
            name: "Bolo Ninho",
            price: 12,
            img: "https://i.imgur.com/1.jpg"
        }, {
            id: 2,
            name: "Copo Morango",
            price: 18,
            img: "https://i.imgur.com/2.jpg"
        }, {
            id: 3,
            name: "Brigadeiro",
            price: 5,
            img: "https://i.imgur.com/3.jpg"
        }];

        let cart = [];

        function render() {
            const el = document.getElementById('list');
            el.innerHTML = products.map(p => `
<div class='card'>
<img src='${p.img}'>
<div class='info'>
<b>${p.name}</b>
<div class='price'>R$${p.price}</div>
<button onclick='add(${p.id})'>Adicionar</button>
</div>
</div>`).join('');
        }

        function add(id) {
            const p = products.find(x => x.id == id);
            cart.push(p);
            update();
        }

        function update() {
            const bar = document.getElementById('cart');
            const total = cart.reduce((a, b) => a + b.price, 0);
            if (cart.length) {
                bar.classList.add('active');
            }
            document.getElementById('total').innerText = 'R$' + total;
        }

        function openCart() {
            document.getElementById('modal').style.display = 'block';
            const el = document.getElementById('items');
            el.innerHTML = cart.map(i => `<p>${i.name}</p>`).join('');
        }

        function closeCart() {
            document.getElementById('modal').style.display = 'none'
        }

        function send() {
            let txt = 'Pedido:\n';
            cart.forEach(i => txt += i.name + '\n');
            window.open('https://wa.me/5511915183761?text=' + encodeURIComponent(txt));
        }

        render();
    </script>

</body>
</html>
